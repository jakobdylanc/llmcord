# Tool Registry
# Define all available tools here. Each tool will be available to all providers/models.
# To add a new tool:
# 1. Implement the handler function in bot/llm/tools/
# 2. Add an entry below with name, description, parameters, and handler path

---
tools:
  - name: web_search
    description: "Search the web for current information"
    parameters:
      - name: "query"
        type: "string"
        description: "The search query"
    handler: "bot.llm.tools.web_search:brave_web_search"

  - name: visuals_core
    description: "Generate data visualizations"
    parameters:
      - name: "viz_type"
        type: "string"
        description: "Type of visualization (e.g., 'bar', 'line', 'pie')"
      - name: "data"
        type: "string"
        description: "JSON string containing data points"
      - name: "title"
        type: "string"
        description: "Title for the visualization (optional)"
        default: ""
    handler: "bot.llm.tools.visuals_core:visuals_core"

  - name: get_market_prices
    description: "Fetch closing prices and daily % change for stock indices or tickers from Yahoo Finance"
    parameters:
      - name: "tickers"
        type: "string"
        description: "Comma-separated Yahoo Finance ticker symbols (e.g. ^TWII,^GSPC,0050.TW)"
      - name: "days"
        type: "integer"
        description: "Calendar days of history to fetch (default 5)"
        default: 5
    handler: "bot.llm.tools.yahoo_finance:get_market_prices"

  - name: google_tools
    description: "Access Gmail emails and Google Calendar events (read-only). Requires OAuth credentials."
    parameters:
      - name: "action"
        type: "string"
        description: "Action to perform: 'get_emails', 'get_email_content', or 'get_events'"
      - name: "count"
        type: "integer"
        description: "Number of items to fetch (default: 10, max: 50)"
        default: 10
      - name: "label_id"
        type: "string"
        description: "Gmail label for get_emails: INBOX, UNREAD, STARRED, SENT, IMPORTANT"
        default: "INBOX"
      - name: "message_id"
        type: "string"
        description: "Gmail message ID (required for get_email_content)"
        default: ""
      - name: "calendar_id"
        type: "string"
        description: "Calendar ID for get_events (default: primary)"
        default: "primary"
    handler: "bot.llm.tools.google_tools:google_tools_wrapper"